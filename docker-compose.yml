services:

  dhcp-backend:
    build: ./backend
    container_name: dhcp-backend
    restart: unless-stopped

    # ── DHCP networking ────────────────────────────────────────────────────────
    # On Linux: uncomment network_mode and comment out the ports + networks blocks
    # below — host mode is the only reliable way to receive UDP broadcast from
    # real clients on the LAN.
    #
    # network_mode: host
    #
    ports:
      - "3000:3000"          # HTTP API + WebSocket
      - "67:67/udp"          # DHCP — required for real lease assignment
    cap_add:
      - NET_ADMIN            # bind to privileged port 67
      - NET_RAW              # send raw UDP packets (conflict detection)

    env_file:
      - .env                 # create from .env.example — never commit .env

    environment:
      - PORT=3000
      - SERVER_IP=${SERVER_IP:-192.168.1.1}
      - SUBNET_MASK=${SUBNET_MASK:-255.255.255.0}
      - ROUTER=${ROUTER:-192.168.1.1}
      - DNS=${DNS:-8.8.8.8,8.8.4.4}
      - POOL_START=${POOL_START:-192.168.1.100}
      - POOL_END=${POOL_END:-192.168.1.200}
      - LEASE_TIME=${LEASE_TIME:-86400}

    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:3000/',r=>process.exit(r.statusCode<500?0:1)).on('error',()=>process.exit(1))\""]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

    networks:
      - dhcp-net

  dhcp-frontend:
    build: ./frontend
    container_name: dhcp-frontend
    restart: unless-stopped
    ports:
      - "80:80"

    depends_on:
      dhcp-backend:
        condition: service_healthy

    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:80"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"

    networks:
      - dhcp-net

networks:
  dhcp-net:
    driver: bridge
